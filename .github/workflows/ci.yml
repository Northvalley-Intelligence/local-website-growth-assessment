name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  foundation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Integration tests
        run: npm run test:integration

      - name: Build
        run: npm run build

      - name: Build Cloudflare worker
        run: npm run cf:build
